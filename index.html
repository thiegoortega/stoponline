<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Stop Online Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" class="screen">
  <h1>Stop Online</h1>
  <input type="text" id="playerName" placeholder="Digite seu nome">
  <button id="joinBtn">Entrar no Jogo</button>
</div>

<div id="waitingScreen" class="screen" style="display:none;">
  <h2>Aguardando jogadores...</h2>
  <ul id="playersList"></ul>
  <button id="startGameBtn" style="display:none;">Iniciar Rodada</button>
</div>

<div id="gameScreen" class="screen" style="display:none;">
  <h2>Letra atual: <span id="currentLetter">A</span></h2>
  <div id="timerBar"><div id="timerFill"></div></div>
  <div class="categories">
    <div class="category"><label>Nome:</label><input type="text" id="nome"></div>
    <div class="category"><label>País:</label><input type="text" id="pais"></div>
    <div class="category"><label>Animal:</label><input type="text" id="animal"></div>
    <div class="category"><label>Objeto:</label><input type="text" id="objeto"></div>
  </div>
  <button id="submitBtn">Enviar Respostas</button>
  <p id="notification" style="color:#ff0;"></p>
</div>

<div id="resultsScreen" class="screen" style="display:none;">
  <h2>Resultados da Rodada</h2>
  <table id="rankingTable">
    <thead>
      <tr><th>Jogador</th><th>Pontos</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <button id="nextRoundBtn">Próxima Rodada</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js"></script>
<script src="script.js"></script>
</body>
</html>
